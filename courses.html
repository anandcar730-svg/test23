<html lang="en">
<head>

<style>
body{margin:0;font-family:Arial;background:#fff5f8;}

header{

h2{color:#ff3399;margin-bottom:20px;}

.card{

padding:20px;
border-radius:15px;
max-width:320px;

box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.btn{
background:linear-gradient(45deg,#ff3399,#cc66ff);

}

.pay{background:#0F9D58;}

.qr{width:150px;margin-top:10px;}

<body>

<header>
<img src="./logo.png" height="50">
<nav>
<a href="index.html">Home</a>
<a href="courses.html">Courses</a>
<a href="about.html">About</a>

</nav>

<section class="section">
<h2>Our Courses</h2>

<!-- 3 MONTH -->

<div class="card">
<h3>3 Month Course</h3>
<p>Certification Course</p>


<input type="text" id="name3" placeholder="Enter your name">

<button class="btn" onclick="sendWhatsApp('3 Month Course','name3')">
Enquire
</button>

<br>

<button class="btn pay" onclick="payUPI(25000,'3 Month Course','name3')">
Pay via UPI
</button>

<p></p>

</div>

<!-- 6 MONTH -->

<div class="card">
<h3>6 Month Course</h3>
<p>Diploma in Fashion Designing</p>


<input type="text" id="name6" placeholder="Enter your name">

<button class="btn" onclick="sendWhatsApp('6 Month Course','name6')">
Enquire
</button>

<br>

<button class="btn pay" onclick="payUPI(50000,'6 Month Course','name6')">
Pay via UPI
</button>

<p></p>

</div>

</section>

<script>
function sendWhatsApp(course,id){
  let name=document.getElementById(id).value;
  if(!name){alert("Enter your name");return;}
  let msg=encodeURIComponent("Hello, I am "+name+" and I want details about "+course);
  window.open("https://wa.me/919446878807?text="+msg,'_blank');
}

function payUPI(amount,course,id){
  let name=document.getElementById(id).value;
  if(!name){alert("Enter your name");return;}
  let note=encodeURIComponent(name+" - "+course);
  let url=`upi://pay?pa=raji.shaji.shalom99@okaxis&pn=Dorcas%20Institute&am=${amount}&cu=INR&tn=${note}`;
  window.location.href=url;
}
</script>
